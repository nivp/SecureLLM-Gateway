services:
  api:
    build: .
    depends_on:
      - mongo
      - redis
      - ollama
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/securellm
      REDIS_URL: redis://redis:6379
      INJECTION_DETECTION_MODE: ${INJECTION_DETECTION_MODE:-classic}
      LLM_CANARY_DEBUG_LOGS: ${LLM_CANARY_DEBUG_LOGS:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://ollama:11434/v1}
      OPENAI_CANARY_MODEL: ${OPENAI_CANARY_MODEL:-gpt-oss:20b}
      OPENAI_MODEL_ALIASES: '${OPENAI_MODEL_ALIASES:-{"gpt-4o":"gpt-oss:20b","claude-3-5-sonnet":"gpt-oss:20b"}}'
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-local-demo-pii-encryption-key-32b}
    ports:
      - "3000:3000"

  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  mongo-data:
  ollama-data:
